version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=inventory_db

  web:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./app:/code/app
    depends_on:
      - db

volumes:
  postgres_data:
